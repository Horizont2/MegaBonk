<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MegaBonk - Main Menu Mockup v2</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Nunito:wght@700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    font-family: 'Nunito', sans-serif;
    background: #1a1a10;
    cursor: default;
    user-select: none;
  }

  /* ═══ BACKGROUND - Dark forest/field feel ═══ */
  .bg-layer {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 50% 110%, #2a3a1a 0%, transparent 50%),
      radial-gradient(ellipse at 20% 30%, #1a2010 0%, transparent 40%),
      radial-gradient(ellipse at 80% 20%, #201a10 0%, transparent 40%),
      linear-gradient(180deg, #0d0e08 0%, #1a1e10 40%, #0d1008 100%);
  }

  /* Subtle green fog */
  .fog { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
  .fog-particle {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle, rgba(80, 120, 40, 0.06), transparent 70%);
    animation: fogDrift linear infinite;
  }
  @keyframes fogDrift {
    0% { transform: translateX(-20%); opacity: 0; }
    20% { opacity: 1; } 80% { opacity: 1; }
    100% { transform: translateX(120vw); opacity: 0; }
  }

  /* Floating embers/sparks */
  .embers { position: absolute; inset: 0; z-index: 2; pointer-events: none; }
  .ember {
    position: absolute; border-radius: 50%;
    animation: emberFloat ease-in-out infinite;
  }
  @keyframes emberFloat {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.1; }
    30% { opacity: 0.9; }
    70% { opacity: 0.6; }
    100% { transform: translateY(-120px) translateX(20px) scale(0.3); opacity: 0; }
  }

  /* ═══ LAYOUT ═══ */
  .menu-container {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* ═══ TITLE ═══ */
  .title-area {
    text-align: center;
    margin-bottom: 10px;
    animation: titleDrop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  @keyframes titleDrop {
    0% { opacity: 0; transform: translateY(-60px) scale(1.3); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .game-title {
    font-family: 'Bungee Shade', sans-serif;
    font-size: 90px;
    color: #ffcc33;
    text-shadow:
      3px 3px 0 #cc6600,
      6px 6px 0 #883300,
      0 0 40px rgba(255, 170, 30, 0.4),
      0 0 80px rgba(255, 120, 0, 0.15);
    line-height: 1;
    letter-spacing: 4px;
  }
  .title-sub {
    font-family: 'Bungee', sans-serif;
    font-size: 16px;
    color: rgba(255, 200, 100, 0.45);
    letter-spacing: 12px;
    margin-top: 2px;
    text-transform: uppercase;
  }

  /* ═══ MAIN AREA (Character + Buttons side by side) ═══ */
  .main-area {
    display: flex;
    align-items: center;
    gap: 60px;
    margin-top: 15px;
  }

  /* ═══ CHARACTER ═══ */
  .char-area {
    display: flex; flex-direction: column; align-items: center;
    animation: fadeUp 0.6s ease-out 0.3s both;
  }
  @keyframes fadeUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .char-platform {
    position: relative;
    width: 240px; height: 280px;
    display: flex; align-items: center; justify-content: center;
  }

  /* Low-poly character body */
  .char-body {
    width: 80px; height: 130px;
    background: linear-gradient(180deg, #5a7a3a, #3d5a25, #2a4018);
    clip-path: polygon(20% 0%, 80% 0%, 95% 35%, 85% 100%, 15% 100%, 5% 35%);
    position: relative;
    animation: charBob 3s ease-in-out infinite;
    filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
  }
  /* Head */
  .char-body::before {
    content: '';
    position: absolute;
    top: -35px; left: 50%; transform: translateX(-50%);
    width: 45px; height: 45px;
    background: linear-gradient(180deg, #e8c090, #c49a6a);
    border-radius: 8px;
    clip-path: polygon(10% 5%, 90% 5%, 100% 50%, 85% 100%, 15% 100%, 0% 50%);
  }
  /* Eyes */
  .char-body::after {
    content: '';
    position: absolute;
    top: -22px; left: 50%; transform: translateX(-50%);
    width: 20px; height: 6px;
    background: transparent;
    border-left: 6px solid #222;
    border-right: 6px solid #222;
  }
  @keyframes charBob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Hammer orbiting */
  .hammer-orbit {
    position: absolute; width: 200px; height: 200px;
    top: 50%; left: 50%;
    margin: -100px 0 0 -100px;
    animation: hammerSpin 2.5s linear infinite;
  }
  @keyframes hammerSpin { to { transform: rotate(360deg); } }

  .hammer {
    position: absolute; top: -8px; left: 50%; margin-left: -14px;
    width: 28px; height: 40px;
  }
  /* Hammer head */
  .hammer-head {
    width: 28px; height: 18px;
    background: linear-gradient(180deg, #888, #666, #555);
    border-radius: 3px;
    box-shadow: 0 0 12px rgba(200, 160, 80, 0.5), inset 0 2px 0 rgba(255,255,255,0.2);
  }
  /* Hammer handle */
  .hammer-handle {
    width: 6px; height: 22px;
    background: linear-gradient(90deg, #8B6914, #a07828, #8B6914);
    margin: 0 auto;
    border-radius: 0 0 2px 2px;
  }

  /* Orbit trail */
  .orbit-trail {
    position: absolute; width: 200px; height: 200px;
    top: 50%; left: 50%; margin: -100px 0 0 -100px;
    border: 2px dashed rgba(200, 160, 60, 0.1);
    border-radius: 50%;
  }

  /* Ground shadow */
  .char-shadow {
    width: 120px; height: 12px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.4), transparent);
    border-radius: 50%;
    margin-top: -5px;
    animation: shadowPulse 3s ease-in-out infinite;
  }
  @keyframes shadowPulse {
    0%, 100% { transform: scaleX(1); } 50% { transform: scaleX(0.85); }
  }

  .char-label {
    font-size: 11px; color: rgba(255,255,255,0.2);
    letter-spacing: 3px; text-transform: uppercase;
    margin-top: 10px;
  }

  /* ═══ BUTTONS PANEL ═══ */
  .buttons-panel {
    display: flex; flex-direction: column;
    gap: 10px; width: 320px;
    animation: fadeUp 0.6s ease-out 0.4s both;
  }

  /* Crystal bar at top of buttons */
  .crystal-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; margin-bottom: 6px;
    background: rgba(60, 200, 220, 0.08);
    border: 2px solid rgba(60, 200, 220, 0.15);
    border-radius: 12px;
  }
  .crystal-gem {
    width: 22px; height: 22px;
    background: linear-gradient(135deg, #40e8ff, #20a0c0);
    clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 20% 100%, 0% 35%);
    box-shadow: 0 0 12px rgba(60, 220, 255, 0.5);
    animation: gemGlow 2s ease-in-out infinite alternate;
  }
  @keyframes gemGlow {
    0% { filter: brightness(1); } 100% { filter: brightness(1.3); }
  }
  .crystal-count {
    font-family: 'Bungee', sans-serif;
    font-size: 20px; color: #60e8ff;
    letter-spacing: 1px;
  }
  .crystal-lbl {
    font-size: 10px; color: rgba(60, 220, 255, 0.35);
    letter-spacing: 3px; text-transform: uppercase;
    margin-left: auto;
  }

  /* ═══ BUTTON STYLES ═══ */
  .menu-btn {
    position: relative;
    padding: 0; border: none;
    border-radius: 12px;
    font-family: 'Bungee', sans-serif;
    font-size: 18px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
    overflow: hidden;
    text-align: center;
    opacity: 0;
    animation: btnPop 0.4s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
  }
  .menu-btn:nth-child(1) { animation-delay: 0.5s; }
  .menu-btn:nth-child(2) { animation-delay: 0.6s; }
  .menu-btn:nth-child(3) { animation-delay: 0.7s; }
  .menu-btn:nth-child(4) { animation-delay: 0.8s; }
  .menu-btn:nth-child(5) { animation-delay: 0.9s; }
  .menu-btn:nth-child(6) { animation-delay: 1.0s; }
  @keyframes btnPop {
    0% { opacity: 0; transform: scale(0.7) translateY(15px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  .menu-btn:active { transform: scale(0.95) !important; }

  /* PLAY button - BIG, golden, standout */
  .btn-play {
    padding: 20px 30px;
    background: linear-gradient(180deg, #ffcc33 0%, #e6a000 50%, #cc8800 100%);
    color: #3a2200;
    font-size: 26px;
    border: 3px solid #ffd855;
    box-shadow:
      0 4px 0 #996600,
      0 6px 20px rgba(255, 170, 0, 0.3),
      inset 0 2px 0 rgba(255,255,255,0.3);
    text-shadow: 0 1px 0 rgba(255,255,255,0.3);
  }
  .btn-play:hover {
    transform: translateY(-3px);
    box-shadow:
      0 7px 0 #996600,
      0 10px 30px rgba(255, 170, 0, 0.5),
      inset 0 2px 0 rgba(255,255,255,0.3);
    background: linear-gradient(180deg, #ffdd55 0%, #eebb22 50%, #ddaa11 100%);
  }
  /* Shine sweep */
  .btn-play::after {
    content: ''; position: absolute;
    top: 0; left: -100%; width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transform: skewX(-20deg);
    animation: sweep 3.5s ease-in-out infinite;
  }
  @keyframes sweep { 0%,100% { left: -100%; } 50% { left: 150%; } }

  /* CONTINUE button */
  .btn-continue {
    padding: 14px 30px;
    background: linear-gradient(180deg, #5a8a35, #4a7528, #3a6020);
    color: #d0f0a0;
    border: 2px solid #6a9a45;
    box-shadow: 0 3px 0 #2a4a15, 0 4px 12px rgba(80, 140, 40, 0.2);
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  .btn-continue:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 0 #2a4a15, 0 8px 20px rgba(80, 140, 40, 0.35);
    background: linear-gradient(180deg, #6a9a45, #5a8535, #4a7028);
  }
  .btn-continue.disabled {
    opacity: 0.3; cursor: not-allowed; pointer-events: none;
    filter: grayscale(0.7);
  }

  /* Secondary buttons */
  .btn-sec {
    padding: 12px 24px;
    background: linear-gradient(180deg, #3a3828, #302e20, #28261a);
    color: rgba(220, 200, 160, 0.7);
    border: 2px solid rgba(100, 90, 60, 0.4);
    box-shadow: 0 2px 0 #1a1810, 0 3px 8px rgba(0,0,0,0.2);
    font-size: 14px;
  }
  .btn-sec:hover {
    transform: translateY(-2px);
    background: linear-gradient(180deg, #4a4838, #3a3828, #302e20);
    color: rgba(255, 230, 180, 0.95);
    border-color: rgba(180, 150, 80, 0.5);
    box-shadow: 0 4px 0 #1a1810, 0 6px 15px rgba(0,0,0,0.3);
  }

  .btn-quit {
    padding: 10px 24px;
    background: transparent;
    color: rgba(180, 140, 100, 0.3);
    border: 1px solid rgba(100, 80, 50, 0.15);
    font-size: 13px;
    box-shadow: none;
  }
  .btn-quit:hover {
    color: rgba(255, 120, 80, 0.7);
    border-color: rgba(255, 100, 60, 0.2);
    background: rgba(255, 80, 40, 0.05);
  }

  .btn-spacer { height: 4px; }

  /* ═══ META UPGRADES ═══ */
  .upgrades-area {
    position: absolute;
    bottom: 70px; left: 50%;
    transform: translateX(-50%);
    z-index: 15;
    animation: fadeUp 0.6s ease-out 1.1s both;
  }
  .upgrades-label {
    text-align: center;
    font-size: 10px; letter-spacing: 4px;
    color: rgba(200, 180, 120, 0.3);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .upgrades-row {
    display: flex; gap: 8px;
  }
  .upg-slot {
    width: 70px; padding: 8px 4px;
    background: rgba(50, 45, 30, 0.7);
    border: 1px solid rgba(100, 90, 50, 0.2);
    border-radius: 10px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    backdrop-filter: blur(4px);
  }
  .upg-slot:hover {
    transform: translateY(-4px);
    border-color: rgba(200, 170, 60, 0.5);
    background: rgba(60, 55, 35, 0.9);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .upg-icon { font-size: 22px; display: block; margin-bottom: 2px; }
  .upg-name { font-size: 8px; color: rgba(200,180,130,0.4); letter-spacing: 1px; text-transform: uppercase; }
  .upg-lv { font-family: 'Bungee', sans-serif; font-size: 10px; color: #c0a050; margin-top: 3px; }
  .upg-bar { width: 80%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin: 5px auto 0; overflow: hidden; }
  .upg-fill { height: 100%; background: linear-gradient(90deg, #c09030, #e0b040); border-radius: 2px; }

  /* ═══ BOTTOM BAR ═══ */
  .bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 25px;
    background: linear-gradient(0deg, rgba(0,0,0,0.4), transparent);
  }
  .ver { font-size: 10px; color: rgba(255,255,255,0.1); letter-spacing: 2px; }

  /* ═══ VIGNETTE ═══ */
  .vignette {
    position: absolute; inset: 0; z-index: 5; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
  }

  /* ═══ DECORATIVE TREES (silhouette) ═══ */
  .trees {
    position: absolute; bottom: 0; left: 0; right: 0;
    z-index: 3; pointer-events: none; height: 200px;
  }
  .tree {
    position: absolute; bottom: 0;
  }
  .tree-trunk {
    width: 8px; height: 40px;
    background: #1a1808;
    margin: 0 auto;
  }
  .tree-top {
    width: 0; height: 0;
    border-left: 25px solid transparent;
    border-right: 25px solid transparent;
    border-bottom: 50px solid #151a08;
    margin: 0 auto;
  }
  .tree-top-2 {
    width: 0; height: 0;
    border-left: 20px solid transparent;
    border-right: 20px solid transparent;
    border-bottom: 40px solid #181e0a;
    margin: -15px auto 0;
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="fog" id="fog"></div>
<div class="embers" id="embers"></div>
<div class="vignette"></div>
<div class="trees" id="trees"></div>

<div class="menu-container">
  <div class="title-area">
    <div class="game-title">MEGABONK</div>
    <div class="title-sub">Bonk or be Bonked</div>
  </div>

  <div class="main-area">
    <!-- Character -->
    <div class="char-area">
      <div class="char-platform" id="charPlatform">
        <div class="orbit-trail"></div>
        <div class="char-body"></div>
        <div class="hammer-orbit">
          <div class="hammer">
            <div class="hammer-head"></div>
            <div class="hammer-handle"></div>
          </div>
        </div>
      </div>
      <div class="char-shadow"></div>
      <div class="char-label">drag to spin</div>
    </div>

    <!-- Buttons -->
    <div class="buttons-panel">
      <div class="crystal-bar">
        <div class="crystal-gem"></div>
        <div class="crystal-count">1,247</div>
        <div class="crystal-lbl">crystals</div>
      </div>

      <button class="menu-btn btn-play" onclick="clickFx(this)">BONK!</button>
      <button class="menu-btn btn-continue" onclick="clickFx(this)">Continue</button>
      <div class="btn-spacer"></div>
      <button class="menu-btn btn-sec" onclick="clickFx(this)">Achievements</button>
      <button class="menu-btn btn-sec" onclick="clickFx(this)">Options</button>
      <button class="menu-btn btn-quit" onclick="clickFx(this)">Quit</button>
    </div>
  </div>
</div>

<!-- Meta upgrades at bottom -->
<div class="upgrades-area">
  <div class="upgrades-label">Meta Upgrades</div>
  <div class="upgrades-row">
    <div class="upg-slot" onclick="upgClick(this)">
      <span class="upg-icon">&#10084;&#65039;</span>
      <div class="upg-name">Health</div>
      <div class="upg-lv">3/10</div>
      <div class="upg-bar"><div class="upg-fill" style="width:30%"></div></div>
    </div>
    <div class="upg-slot" onclick="upgClick(this)">
      <span class="upg-icon">&#9889;</span>
      <div class="upg-name">Speed</div>
      <div class="upg-lv">5/10</div>
      <div class="upg-bar"><div class="upg-fill" style="width:50%"></div></div>
    </div>
    <div class="upg-slot" onclick="upgClick(this)">
      <span class="upg-icon">&#9876;&#65039;</span>
      <div class="upg-name">Damage</div>
      <div class="upg-lv">2/10</div>
      <div class="upg-bar"><div class="upg-fill" style="width:20%"></div></div>
    </div>
    <div class="upg-slot" onclick="upgClick(this)">
      <span class="upg-icon">&#128737;&#65039;</span>
      <div class="upg-name">Armor</div>
      <div class="upg-lv">0/10</div>
      <div class="upg-bar"><div class="upg-fill" style="width:0%"></div></div>
    </div>
    <div class="upg-slot" onclick="upgClick(this)">
      <span class="upg-icon">&#129522;</span>
      <div class="upg-name">Magnet</div>
      <div class="upg-lv">7/10</div>
      <div class="upg-bar"><div class="upg-fill" style="width:70%"></div></div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <div class="ver">v0.3.0 alpha</div>
</div>

<script>
  // Fog
  const fog = document.getElementById('fog');
  for (let i = 0; i < 5; i++) {
    const p = document.createElement('div');
    p.className = 'fog-particle';
    const size = 250 + Math.random() * 400;
    Object.assign(p.style, {
      width: size+'px', height: size+'px',
      top: (40 + Math.random()*40)+'%', left: '-20%',
      animationDuration: (25+Math.random()*25)+'s',
      animationDelay: (Math.random()*20)+'s'
    });
    fog.appendChild(p);
  }

  // Embers
  const embers = document.getElementById('embers');
  for (let i = 0; i < 20; i++) {
    const e = document.createElement('div');
    e.className = 'ember';
    const s = 2 + Math.random() * 3;
    const colors = ['rgba(255,180,50,0.7)','rgba(255,140,30,0.6)','rgba(255,220,100,0.5)'];
    Object.assign(e.style, {
      width: s+'px', height: s+'px',
      left: (Math.random()*100)+'%',
      top: (50+Math.random()*45)+'%',
      background: colors[Math.floor(Math.random()*3)],
      animationDuration: (3+Math.random()*5)+'s',
      animationDelay: (Math.random()*6)+'s'
    });
    embers.appendChild(e);
  }

  // Trees silhouette
  const trees = document.getElementById('trees');
  for (let i = 0; i < 14; i++) {
    const t = document.createElement('div');
    t.className = 'tree';
    const scale = 0.6 + Math.random() * 1.2;
    t.style.left = (i * 7.5 + Math.random()*5) + '%';
    t.style.transform = 'scale('+scale+')';
    t.style.opacity = 0.3 + Math.random()*0.4;
    t.innerHTML = '<div class="tree-top-2"></div><div class="tree-top"></div><div class="tree-trunk"></div>';
    trees.appendChild(t);
  }

  // Parallax
  document.addEventListener('mousemove', (ev) => {
    const mx = (ev.clientX / window.innerWidth - 0.5) * 2;
    const my = (ev.clientY / window.innerHeight - 0.5) * 2;
    const ch = document.getElementById('charPlatform');
    if (ch) ch.style.transform = 'perspective(500px) rotateY('+mx*8+'deg) rotateX('+-my*4+'deg)';
  });

  // Click flash
  function clickFx(btn) {
    btn.style.filter = 'brightness(1.6)';
    setTimeout(() => { btn.style.filter = ''; }, 120);
  }
  function upgClick(sl) {
    sl.style.transition = 'none';
    sl.style.transform = 'scale(0.9)';
    setTimeout(() => {
      sl.style.transition = 'transform 0.3s cubic-bezier(0.34,1.56,0.64,1)';
      sl.style.transform = 'translateY(-4px)';
    }, 80);
    setTimeout(() => { sl.style.transform = ''; }, 400);
  }
</script>
</body>
</html>
